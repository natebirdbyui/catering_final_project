<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIPOC | Cart</title>
    <meta name="description" content="HIPOC is a premier catering service that offers
    a wide range of delicious and customizable menu options for all occasions. 
    Whether you're planning a corporate event, wedding, or private party, 
    HIPOC has you covered with exceptional service and delectable cuisine.">
    <meta name="keywords" content="HIPOC, catering service, event catering, 
    wedding catering, corporate catering, private party catering, customizable menu, delicious cuisine">
    <meta name="author" content="HIPOC">
  <script type="module" crossorigin src="/catering_final_project/assets/main-CusExNnF.js"></script>
  <link rel="stylesheet" crossorigin href="/catering_final_project/assets/main-B29dq7X7.css">
</head>
<body>
    <header class="header-create">
        <!--header.js will insert header content here-->
    </header>

    <main class="cart-page">

    <h1>Your Cart</h1>

    <div class="cart-page-layout">

        <!-- CART ITEMS -->
        <section class="cart-page-items">
            <h2>Your Order</h2>
            <div id="cart-page-items">
                <!-- JS inserts cart items -->
            </div>
        </section>

        <!-- SUMMARY -->
        <aside class="cart-page-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span>
                    $<span id="page-subtotal">0.00</span>
                </span>
            </div>
            <div class="summary-row">
                <span>Number of Guests</span>
                <span id="guest-count">0</span>
            </div>

            <div class="summary-row">
                <span>Tax</span>
                <span>
                    $<span id="page-tax">0.00</span>
                </span>
            </div>
            
            <div class="summary-row total">
                <span>Total</span>
                <span>
                    $<span id="page-total">0.00</span>
                </span>
            </div>
            <button id="page-checkout-btn">
                Proceed to Checkout
            </button>
        </aside>
    </div>
</main>

<footer class="footer-create">
    <!--footer.js will insert footer content here-->
</footer>

</body>
</html>
